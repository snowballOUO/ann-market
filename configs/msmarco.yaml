dataset:
    name: msmarco
    path: data/msmarco
    dim: 384
    format: hdf5
    file: msmarco-passage-384-euclidean.hdf5
    max_base: 1000000           # use 1M subset for index (full set is 8.8M)

index:
    type: ivfpq
    nlist: 4096
    m: 24                   # 384 / 24 = 16 dims per sub-vector
    nbits: 8
    metric: L2

execution:
  search_param_configs:
    - {nprobe: 8,  rerank_k: 50,  early_stop: false}
    - {nprobe: 16, rerank_k: 100, early_stop: false}
    - {nprobe: 32, rerank_k: 200, early_stop: false}
    - {nprobe: 64, rerank_k: 400, early_stop: false}
    - {nprobe: 128, rerank_k: 800, early_stop: false}

pricing:
  tiers: [0.001, 0.002, 0.005, 0.01, 0.02]

cost_model:
  base_per_ms: 0.00005
  fixed_overhead: 0.0001

shadow:
  sample_rate: 0.02
  exact_search_k_multiplier: 1.0

buyer:
  best_dist_anchor: 40000.0         # TODO: calibrate for 384-dim L2
  worst_dist_anchor: 150000.0

logging:
  output_dir: logs
  flush_every_n: 100

experiment:
  seed: 42
  n_queries: 1000
  output_dir: runs
