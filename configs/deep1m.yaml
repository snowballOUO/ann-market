dataset:
    name: deep1m
    path: data/deep1m
    dim: 96
    format: hdf5
    file: deep-image-96-angular.hdf5
    max_base: 1000000           # full set is 10M; use 1M for index
    normalize: true             # angular -> L2 via normalization

index:
    type: ivfpq
    nlist: 2048
    m: 24                   # 96 / 24 = 4 dims per sub-vector
    nbits: 8
    metric: L2

execution:
  search_param_configs:
    - {nprobe: 8,  rerank_k: 50,  early_stop: false}
    - {nprobe: 16, rerank_k: 100, early_stop: false}
    - {nprobe: 32, rerank_k: 200, early_stop: false}
    - {nprobe: 64, rerank_k: 400, early_stop: false}
    - {nprobe: 128, rerank_k: 800, early_stop: false}

pricing:
  tiers: [0.001, 0.002, 0.005, 0.01, 0.02]

cost_model:
  base_per_ms: 0.00005
  fixed_overhead: 0.0001

models:
  difficulty: models/deep1m/difficulty_v1.onnx

shadow:
  sample_rate: 0.02
  exact_search_k_multiplier: 1.0

buyer:
  best_dist_anchor: 0.28            # calibrated p10 over 5 seeds
  worst_dist_anchor: 0.7             # calibrated p90 over 5 seeds

logging:
  output_dir: logs
  flush_every_n: 100

experiment:
  seed: 42
  n_queries: 1000
  output_dir: runs
